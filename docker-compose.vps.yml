services:
  slefk3lu7d:
    container_name: slefk3lu7d_app
    image: ghcr.io/mr-devloper005/pkkwb.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3231:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5m
      timeout: 3s
      retries: 2
